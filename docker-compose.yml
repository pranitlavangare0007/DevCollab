version: "3.9"

services:

  postgres:
    image: postgres:15-alpine
    container_name: devcollab-postgres
    environment:
      POSTGRES_DB: devcollab
      POSTGRES_USER: devcollab
      POSTGRES_PASSWORD: devcollab123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devcollab"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: devcollab-redis
    command: redis-server --requirepass redis123
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis123", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: devcollab-backend

    ports:
      - "8080:8080"

    # Load variables from backend/.env
    env_file:
      - ./backend/.env

    # Override only values that must be different inside Docker
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/devcollab
      SPRING_REDIS_HOST: redis

    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

    restart: on-failure

volumes:
  postgres_data: