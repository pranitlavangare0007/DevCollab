spring.config.import=optional:file:.env
# ?? Server ????????????????????????????????????????????????????????????????????
server.port=${SERVER_PORT:8080}

# ?? Database ??????????????????????????????????????????????????????????????????
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/devcollab}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:devcollab}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:devcollab123}
spring.datasource.driver-class-name=org.postgresql.Driver

# ?? JPA ???????????????????????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ?? Redis ?????????????????????????????????????????????????????????????????????
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:redis123}
spring.data.redis.ssl.enabled=${SPRING_REDIS_SSL:false}

# ?? JWT ???????????????????????????????????????????????????????????????????????
jwt.secret=${JWT_SECRET:devcollab-super-secret-key-must-be-at-least-32-characters-long}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ?? GitHub OAuth ??????????????????????????????????????????????????????????????
github.client-id=${GITHUB_CLIENT_ID}
github.client-secret=${GITHUB_CLIENT_SECRET}

# ?? CORS ??????????????????????????????????????????????????????????????????????
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

# ?? Actuator ??????????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# ?? Logging ???????????????????????????????????????????????????????????????????
logging.level.com.devcollab=DEBUG
logging.level.org.springframework.web.socket=WARN
logging.level.org.springframework.messaging=WARN
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.web.filter.CommonsRequestLoggingFilter=DEBUG